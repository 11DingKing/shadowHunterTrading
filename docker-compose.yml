version: '3.8'

services:
  shadow-hunter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shadow-hunter-app
    ports:
      - "8081:6080"
    environment:
      - DISPLAY=:99
      - QT_QPA_PLATFORM=xcb
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
